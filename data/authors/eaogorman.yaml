bio: "Elizabeth (Liz) A. O'Gorman is a computational neurobiologist with a Ph.D. in Neurobiology and a concurrent M.S. in Electrical and Computer Engineering concentrating in Data Analytics and Machine Learning from Duke University. Her research interests include developing and using state-of-the-art computational methods to discover fundamental algorithms and computations used by the brain to produce adaptive individual and social behaviors. Methods confine and compliment scientific discoveries --- to that end, her objective is to develop and use novel methods to advance science. Most recently, as a computationalist, she has developed methods for adaptive neuroscience experimentation, and as an experimentalist, she has used these methods to reinforce adaptive behaviors. Ultimately, she is interested in how environment and experience shape adaptive behaviors throughout the lifespan using computational and experimental approaches."
